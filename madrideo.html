<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MADRIDEO_FINALPROJECT_WEB_SYS_1</title>
    <link rel="stylesheet" href="finalprojlorinz.css">
</head>
<body>

    <header>
        <h1>TIMEPIECES</h1>
        <div class="cart-badge">Items in Cart: <span id="cart-count">0</span></div>
    </header>

    <main>
        <section id="products-container" class="product-grid">
            
            <div class="product-card" data-id="1" data-name="Casio Classic" data-price="1500">
                <div class="product-emoji">⌚</div>
                <h3>Casio Classic</h3>
                <p>₱1,500</p>
                <button onclick="addToCart(1)">Add to Cart</button>
            </div>

            <div class="product-card" data-id="2" data-name="Seiko Automatic" data-price="8500">
                <div class="product-emoji">⏱️</div>
                <h3>Seiko Automatic</h3>
                <p>₱8,500</p>
                <button onclick="addToCart(2)">Add to Cart</button>
            </div>

            <div class="product-card" data-id="3" data-name="G-Shock Digital" data-price="4000">
                <div class="product-emoji">⌚</div>
                <h3>G-Shock Digital</h3>
                <p>₱4,000</p>
                <button onclick="addToCart(3)">Add to Cart</button>
            </div>

            <div class="product-card" data-id="4" data-name="Leather Minimalist" data-price="2500">
                <div class="product-emoji">⌚</div>
                <h3>Leather Minimalist</h3>
                <p>₱2,500</p>
                <button onclick="addToCart(4)">Add to Cart</button>
            </div>

            <div class="product-card" data-id="5" data-name="Smart Watch" data-price="3500">
                <div class="product-emoji">⌚</div>
                <h3>Smart Watch</h3>
                <p>₱3,500</p>
                <button onclick="addToCart(5)">Add to Cart</button>
            </div>

        </section>

        <section id="cart-section">
            <h2>Your Shopping Cart</h2>
            <div id="cart-items"></div>
            
            <p id="empty-msg">Your cart is empty.</p>
            
            <div id="cart-total-container" style="display: none;">
                <hr>
                <h3>Total: ₱<span id="total-price">0</span></h3>
                <button class="clear-btn" onclick="clearCart()">Clear Cart</button>
            </div>
        </section>
    </main>

    <script src="madrideo.js"></script>
</body>
</html>
